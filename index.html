<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server on suletud</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, Arial, sans-serif;
      color: #fff;
      background: #000;
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      background-image: url('https://preview.redd.it/some-fivem-gta-v-screenshots-upscaled-with-ai-v0-w1pkf9k71vxc1.png?width=1080&crop=smart&auto=webp&s=d8b046abe61e42c2e71b8855c3b2ee53c96ff586');
      background-size: cover;
      background-position: center;
      filter: blur(4px) brightness(0.6);
      transform: scale(1.1);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 900px;
      padding: 30px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .text {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 15px;
      color: rgba(255,255,255,0.85);
    }

    .days {
      font-weight: 800;
      color: #fff;
    }

    .recommend {
      margin-top: 40px;
      padding: 25px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .recommend h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 15px;
    }

    .recommend p {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: rgba(255,255,255,0.85);
    }

    .owner-note {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
    }

    .wknd-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      transition: 0.25s;
    }

    .wknd-btn img {
      width: 28px;
      height: 28px;
    }

    .wknd-btn:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.2);
    }

    .link {
      margin-top: 10px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>

<body>

  <div class="background"></div>

  <div class="content">
    <h1>SERVER ON SULETUD</h1>

    <p class="text">
      Kuna mr.lill pole minu kirjadele vastanud juba viimased 
      <span class="days" id="days">0</span> päeva,
      siis olen otsustanud serveri sulgeda.
    </p>

    <p class="text" style="opacity: 0.7;">
      See on <span class="days" id="days2">0</span> päeva vastuseta.
    </p>

    <div class="recommend">
      <h2>Soovitatud rollimängu server</h2>

      <p>
        Jaanmangib soovitab isiklikult <b>WKND RP</b> serverit.
      </p>

      <a href="https://wkndrp.ee" target="_blank" class="wknd-btn">
        <img src="https://wkndrp.ee/assets/wknd_logo.png">
        WKNDRP Kodulehekülg
      </a>
    </div>
  </div>

  <script>
    const startDate = new Date('2026-02-24T00:11:15');

    function updateDays() {
      const now = new Date();
      let diff = now - startDate;
      if (diff < 0) diff = 0;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById('days').textContent = days;
      document.getElementById('days2').textContent = days;
    }

    updateDays();
    setInterval(updateDays, 60000);
  </script>

</body>
</html>
